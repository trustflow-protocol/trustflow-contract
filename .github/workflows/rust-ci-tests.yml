name: Rust CI Tests

on:
  pull_request:
    paths:
      - "contracts/**"
      - "Cargo.toml"
      - "Cargo.lock"
      - "rust-toolchain.toml"
  push:
    branches:
      - main
      - master

env:
  CARGO_TERM_COLOR: always

jobs:
  test:
    name: Run Cargo Tests
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: wasm32-unknown-unknown
          components: rustfmt, clippy

      - name: Cache cargo registry
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            target
          key: ${{ runner.os }}-cargo-test-${{ hashFiles('**/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-test-
            ${{ runner.os }}-cargo-

      - name: Run tests (abundance)
        run: cargo test --package abundance
        working-directory: contracts

      - name: Run tests (crowdfund)
        run: cargo test --package crowdfund
        working-directory: contracts

      - name: Run tests (mock-token)
        run: cargo test --package mock-token
        working-directory: contracts

      - name: Run all workspace tests
        run: cargo test --workspace
        working-directory: contracts
